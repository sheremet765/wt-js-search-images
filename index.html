<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Пошук зображень</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/izitoast/dist/css/iziToast.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/simplelightbox/dist/simple-lightbox.min.css"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <h1 class="title">Пошук зображень</h1>

        <form class="search-form" id="search-form">
          <input
            id="search-bar"
            type="text"
            name="searchQuery"
            autocomplete="off"
            placeholder="Введіть запит"
          />
          <button type="submit" id="search-button">Пошук</button>
        </form>
      </div>
    </header>

    <main class="container">
      <div class="gallery" id="gallery"></div>

      <nav class="pagination-container is-hidden" id="pagination-container">
        <button class="pagination-button" id="prev-button" type="button">
          Назад
        </button>

        <div id="pagination-numbers"></div>

        <button class="pagination-button" id="next-button" type="button">
          Далі
        </button>
      </nav>
    </main>

    <script type="module" src="./js/api.js"></script>
  </body>
</html>
